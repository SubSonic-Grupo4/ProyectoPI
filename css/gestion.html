<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edición del Perfil del Festival</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ebebeb;
      font-family: 'DM Sans', sans-serif;
      padding: 2rem;
    }

    .card {
      background: #f5f4f2;
      border-radius: 18px;
      padding: 2.8rem 3rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      color: #1a1a1a;
      margin-bottom: 2rem;
    }

    /* --- Section Labels --- */
    .section-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 0.6rem;
      margin-top: 1.6rem;
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }

    .section-label span {
      font-weight: 300;
      font-size: 0.68rem;
      color: #888;
      text-transform: none;
      letter-spacing: 0.02em;
    }

    /* --- Inputs --- */
    textarea, input[type="text"] {
      width: 100%;
      background: #eceae6;
      border: 1px solid #d8d5cf;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: #333;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea {
      padding: 0.85rem 1rem;
      resize: vertical;
      min-height: 110px;
    }

    input[type="text"] {
      padding: 0.75rem 1rem 0.75rem 2.5rem;
    }

    textarea::placeholder, input[type="text"]::placeholder {
      color: #aaa;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: #a0998c;
      box-shadow: 0 0 0 3px rgba(160,153,140,0.15);
    }

    /* --- Social grid --- */
    .social-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .input-icon-wrap {
      position: relative;
    }

    .input-icon-wrap .icon {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      display: flex;
      align-items: center;
    }

    .input-icon-wrap .icon svg {
      width: 14px;
      height: 14px;
    }

    /* --- Gallery --- */
    .gallery-section {
      margin-top: 0.6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .gallery-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      width: 100%;
      margin-bottom: 0.75rem;
    }

    .gallery-thumb {
      width: 64px;
      height: 64px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid #d0cdc7;
    }

    /* --- Buttons --- */
    .btn-add-photo {
      background: #e4e1da;
      border: 1.5px dashed #bab5ac;
      color: #666;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.7rem 2.2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-add-photo:hover {
      background: #dbd8d0;
      border-color: #a09990;
    }

    .btn-save {
      margin-top: 2rem;
      width: 100%;
      background: #ccc9c2;
      border: none;
      border-radius: 100px;
      color: #3a3a3a;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }

    .btn-save:hover {
      background: #b5b1a8;
      color: #1a1a1a;
      transform: translateY(-1px);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: #dbd8d2;
      margin: 1.8rem 0 0;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1 class="card-title">Gestión del Perfil de proovedor</h1>

    <!-- Biografía -->
    <div class="section-label">Biografía <span>(Biography)</span></div>
    <textarea placeholder="Escribe una breve biografía sobre ti o tu empresa..."></textarea>

    <!-- Redes Sociales -->
    <div class="section-label">Redes Sociales <span>(Social Networks)</span></div>
    <div class="social-grid">

      <div class="input-icon-wrap">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
            <path d="M22 12a10 10 0 1 0-11.563 9.875v-6.987H7.898V12h2.539V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.888h-2.33v6.987A10.003 10.003 0 0 0 22 12z"/>
          </svg>
        </span>
        <input type="text" placeholder="Facebook" />
      </div>

      <div class="input-icon-wrap">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.332 3.608 1.308.975.975 1.246 2.242 1.308 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.333 2.633-1.308 3.608-.975.975-2.242 1.246-3.608 1.308-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.333-3.608-1.308C2.495 19.466 2.224 18.2 2.162 16.833 2.104 15.567 2.093 15.187 2.093 12s.011-3.584.069-4.85C2.224 5.784 2.495 4.517 3.47 3.541c.975-.975 2.242-1.246 3.608-1.308C8.416 2.175 8.796 2.163 12 2.163zm0-2.163C8.741 0 8.333.013 7.053.072 5.775.131 4.602.44 3.635 1.408 2.667 2.375 2.358 3.548 2.299 4.826 2.24 6.106 2.228 6.514 2.228 12c0 5.486.012 5.894.071 7.174.059 1.278.368 2.451 1.336 3.418.967.968 2.14 1.277 3.418 1.336C8.333 23.987 8.741 24 12 24s3.667-.013 4.947-.072c1.278-.059 2.451-.368 3.418-1.336.968-.967 1.277-2.14 1.336-3.418.059-1.28.072-1.688.072-7.174 0-5.486-.013-5.894-.072-7.174-.059-1.278-.368-2.451-1.336-3.418C19.398.44 18.225.131 16.947.072 15.667.013 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
          </svg>
        </span>
        <input type="text" placeholder="Instagram" />
      </div>

      <div class="input-icon-wrap">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </span>
        <input type="text" placeholder="X (Twitter)" />
      </div>

      <div class="input-icon-wrap">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </span>
        <input type="text" placeholder="Sitio Web" />
      </div>

    </div>

    <!-- Galería -->
    <div class="section-label">Galería de Fotos <span>(Photos Gallery)</span></div>
    <div class="gallery-section">
      <div class="gallery-grid" id="gallery-grid"></div>
      <button class="btn-add-photo" onclick="addPhoto()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Añadir Foto
      </button>
    </div>

    <div class="divider"></div>

    <button class="btn-save">Guardar Cambios</button>
  </div>

  <script>
    function addPhoto() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = document.createElement('img');
          img.src = ev.target.result;
          img.className = 'gallery-thumb';
          document.getElementById('gallery-grid').appendChild(img);
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }
  </script>

</body>
</html>
