<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subsonic Festival - Login</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <main class="auth">
    <section class="auth-card">

      <div class="auth-brand">
        <div class="auth-title">SUBSONIC</div>
        <div class="auth-subtitle">FESTIVAL</div>
      </div>

      <h1 class="auth-h1">Sign In</h1>

      <form class="auth-form" id="loginForm">
        <input
          class="auth-input"
          id="email"
          type="email"
          placeholder="Email Address"
          required
        />

        <input
          class="auth-input"
          id="password"
          type="password"
          placeholder="Password"
          required
        />

        <button class="auth-btn" type="submit">Sign In</button>

        <div class="auth-divider">
          <span></span>
          <p>or</p>
          <span></span>
        </div>

        <div class="auth-social">
          <button class="auth-social-btn" type="button">
            <span class="icon">G</span>
            <span>Log in with Google</span>
          </button>

          <button class="auth-social-btn" type="button">
            <span class="icon">◎</span>
          </button>
        </div>

        <p class="auth-footer">
          Don’t have an account?
          <a href="#">Register Now</a>
        </p>

        <p id="loginError" style="color: #ff4d4d; margin-top: 10px; display: none;">
          Credenciales incorrectas
        </p>
      </form>

    </section>
  </main>

  <script src="../js/auth.js?v=1"></script>
  <script>
    const API_BASE_URL = "";

    async function loginUser(email, password) {
      const errorText = document.getElementById("loginError");
      errorText.style.display = "none";

      try {
        const response = await fetch(`${API_BASE_URL}/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });

        if (!response.ok) {
          throw new Error("Credenciales incorrectas");
        }

        const data = await response.json();

        authSaveSession(data.user, data.access_token);

        if (String(data.user.rol).toUpperCase() === "PROVEEDOR") {
          window.location.href = "gestion.html?v=1";
        } else {
          window.location.href = "tickets.html";
        }
      } catch (error) {
        authClearSession();
        errorText.style.display = "block";
      }
    }

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      loginUser(email, password);
    });
  </script>

</body>
</html>
