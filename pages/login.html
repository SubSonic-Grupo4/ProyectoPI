<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subsonic Festival - Login</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <main class="auth">
    <section class="auth-card">

      <div class="auth-brand">
        <div class="auth-title">SUBSONIC</div>
        <div class="auth-subtitle">FESTIVAL</div>
      </div>

      <h1 class="auth-h1">Sign In</h1>

      <form class="auth-form">
        <input class="auth-input" type="email" placeholder="Email Address" />
        <input class="auth-input" type="password" placeholder="Password" />

        <button class="auth-btn" type="button">Sign In</button>

        <div class="auth-divider">
          <span></span>
          <p>or</p>
          <span></span>
        </div>

        <div class="auth-social">
          <button class="auth-social-btn" type="button">
            <span class="icon">G</span>
            <span>Log in with Google</span>
          </button>

          <button class="auth-social-btn" type="button">
            <span class="icon">◎</span>
          </button>
        </div>

        <p class="auth-footer">
          Don’t have an account?
          <a href="#">Register Now</a>
        </p>
      </form>

    </section>
  </main>

</body>
</html>
