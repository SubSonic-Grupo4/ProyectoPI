<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Perfil - Subsonic</title>
  <link rel="stylesheet" href="../css/profile.css?v=9">
</head>
<body>

<div class="profile-container">
  <div class="profile-card">
    <div class="profile-header">
      <a class="back-link" href="./tickets.html?v=9">Volver a My Tickets</a>
    </div>

    <h1>Mi Perfil</h1>

    <!-- Imagen editable -->
    <div class="avatar-wrapper">
      <img src="https://i.pravatar.cc/150" class="avatar" id="profileImage">
      <label for="imageUpload" class="edit-avatar">✎</label>
      <input type="file" id="imageUpload" hidden>
    </div>

    <!-- Formulario -->
    <div class="profile-form">
      <input id="profileName" type="text" placeholder="Nombre completo">
      <input id="profileEmail" type="email" placeholder="Email">
      <input id="profileAddress" type="text" placeholder="Dirección">

      <button id="saveProfileBtn" type="button">Guardar Cambios</button>
    </div>

  </div>
</div>

<!-- Scripts -->
<script src="../js/profile.js?v=8"></script>

</body>
</html>
