<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Perfil - Subsonic</title>
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body>

<div class="profile-container">

  <div class="profile-card">

    <h1>Mi Perfil</h1>

    <!-- Imagen editable -->
    <div class="avatar-wrapper">
      <img src="https://i.pravatar.cc/150" class="avatar" id="profileImage">
      <label for="imageUpload" class="edit-avatar">✎</label>
      <input type="file" id="imageUpload" hidden>
    </div>

    <!-- Formulario -->
    <div class="profile-form">
      <input type="text" placeholder="Nombre completo">
      <input type="email" placeholder="Email">
      <input type="text" placeholder="Dirección">

      <button>Guardar Cambios</button>
    </div>

  </div>

</div>

<script>
  // Vista previa de imagen (opcional pero queda profesional)
  const upload = document.getElementById("imageUpload");
  const image = document.getElementById("profileImage");

  upload.addEventListener("change", function() {
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        image.src = e.target.result;
      }
      reader.readAsDataURL(file);
    }
  });
</script>

</body>
</html>
