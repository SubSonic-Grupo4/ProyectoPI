<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subsonic Vendors - Reserva de Espacios</title>
    <link rel="stylesheet" href="EstiloReservaEspacio.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="logo">
                <span class="icon-s">S</span>
                <h2>SUBSONIC <span>VENDORS</span></h2>
            </div>
            
            <div class="filter-section">
                <label>Tipo de Espacio</label>
                <div class="toggle-group">
                    <div class="toggle-item">
                        <span>Food</span> 
                        <input type="checkbox" class="filter-check" value="F" checked>
                    </div>
                    <div class="toggle-item">
                        <span>Merch</span> 
                        <input type="checkbox" class="filter-check" value="M" checked>
                    </div>
                    <div class="toggle-item">
                        <span>Art</span> 
                        <input type="checkbox" class="filter-check" value="A">
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <label>Rango de Precio</label>
                <select class="custom-select" id="priceFilter">
                    <option value="all">Todos</option>
                    <option value="1000">Económico (< $1000)</option>
                    <option value="premium">Premium (> $1000)</option>
                </select>
            </div>

            <button class="btn-primary" onclick="window.location.reload()">Reiniciar Vista</button>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h3>Cuadrícula de Disponibilidad de Stands</h3>
            </header>
            
            <div class="grid-container">
                <div id="boothGrid" class="booth-grid">
                    </div>
            </div>

            <div id="boothTooltip" class="booth-tooltip">
                <div class="tooltip-content">
                    <strong>Stand: <span id="tooltipID">-</span></strong>
                    <p>Tipo: <span id="tooltipType">-</span><br>
                       Tamaño: 10x10ft<br>
                       Precio: <span id="tooltipPrice">-</span></p>
                    <div class="tooltip-actions">
                        <button class="btn-small btn-dark">Reservar</button>
                        <button class="btn-small btn-outline">INFO</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
