<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compra de entradas - Subsonic</title>
  <link rel="stylesheet" href="../css/purchase.css?v=6" />
</head>
<body>

<main class="dashboard">
  <div class="dashboard-card">

    <section class="content">
      <div class="purchase-header">
        <h1>Compra de Entradas</h1>
        <a class="back-link" href="./tickets.html?v=6">Volver a My Tickets</a>
      </div>

      <div class="ticket-card">
        <div class="ticket-img"></div>

        <div class="ticket-info">
          <h3 id="eventTitle">Subsonic Main Stage</h3>
          <p id="eventDate">12 Julio 2026</p>
        </div>
      </div>

      <div class="profile-form" style="max-width:400px; margin-top:30px;">
        <label>Selecciona Evento</label>
        <select id="eventSelect"></select>

        <label>Selecciona Pase</label>
        <select id="passSelect"></select>

        <label>Cantidad</label>
        <select id="qtySelect"></select>

        <button class="save-btn" id="confirmPurchaseBtn" type="button">Confirmar Compra</button>
      </div>

    </section>

  </div>
</main>

<!-- Scripts -->

<script src="../js/auth.js?v=1"></script>
<script src="../js/purchase.js?v=7"></script>

</body>
</html>
