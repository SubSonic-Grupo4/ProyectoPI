<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compra de entradas - Subsonic</title>
  <link rel="stylesheet" href="../css/purchase.css" />
</head>
<body>

<main class="dashboard">
  <div class="dashboard-card">

    <section class="content">

      <h1>Compra de Entradas</h1>

      <div class="ticket-card">
        <div class="ticket-img"></div>

        <div class="ticket-info">
          <h3>Subsonic Main Stage</h3>
          <p>12 Julio 2026</p>
        </div>
      </div>

      <div class="profile-form" style="max-width:400px; margin-top:30px;">
        <label>Selecciona Pase</label>
        <select>
          <option>Pase General - 49€</option>
          <option>Pase VIP - 89€</option>
          <option>Full Experience - 129€</option>
        </select>

        <label>Cantidad</label>
        <select>
          <option>1</option>
          <option>2</option>
          <option>3</option>
        </select>

        <button class="save-btn">Confirmar Compra</button>
      </div>

    </section>

  </div>
</main>

</body>
</html>
