<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Tickets - Subsonic</title>
  <link rel="stylesheet" href="../css/tickets.css?v=7" />
</head>
<body>

<main class="dashboard">
  <div class="dashboard-card">

    <!-- Sidebar -->
    <aside class="sidebar">
      <button class="sidebar-btn active">My Tickets</button>
      <button class="sidebar-btn" id="goPurchase">Comprar Entradas</button>
      <button class="sidebar-btn" id="goProfile">Account Settings</button>

      <!-- AQUÍ SE PINTAN LOS MINI TICKETS -->
      <div id="miniTickets"></div>
    </aside>

    <!-- Main Content -->
    <section class="content">
      <div class="content-header">
        <div>
          <h1>My Tickets</h1>
          <p class="content-subtitle">Gestiona tus entradas activas y descubre nuevas experiencias para el festival.</p>
        </div>
      </div>

      <div class="purchase-banner">
        <div class="purchase-copy">
          <span class="purchase-tag">Subsonic Passes</span>
          <h2>¿Quieres comprar otra entrada?</h2>
          <p>Entra en la zona de compra y elige evento, pase y cantidad en cuestión de segundos.</p>
        </div>
        <a class="purchase-link" href="./purchase.html?v=7">Comprar Entradas Ahora</a>
      </div>

      <!-- AQUÍ SE PINTAN LOS TICKETS GRANDES -->
      <div id="ticketsList"></div>

      <!-- Profile Panel -->
      <div class="profile-panel">
        <div class="avatar" id="avatarBox"></div>

        <div class="profile-form">
          <input type="text" id="nameInput" placeholder="Name">
          <input type="email" id="emailInput" placeholder="Email">
          <button class="save-btn" id="saveProfileBtn" type="button">Save Changes</button>
        </div>
      </div>

    </section>

  </div>
</main>

<!-- Scripts: primero datos, luego lógica -->
  <script src="../js/auth.js?v=1"></script>
  <script src="../js/tickets.js?v=10"></script>

</body>
</html>
