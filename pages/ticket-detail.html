<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Detalle Entrada - Subsonic</title>
  <link rel="stylesheet" href="../css/detail.css">
</head>
<body>

<main class="detail">
  <section class="detail-card">

    <header class="detail-header">
      <div>
        <h1>Detalle de Entrada</h1>
        <p class="muted">Información de tu ticket (prototipo).</p>
      </div>

      <a class="back-btn" href="./tickets.html">← Volver</a>
    </header>

    <div class="ticket-hero">
      <div class="hero-left">
        <div class="event-image"></div>
        <div class="event-meta">
          <h2 id="eventName">Subsonic Main Stage</h2>
          <p id="eventMeta">Madrid · 12 Julio 2026</p>
          <span id="statusBadge" class="badge badge--active">Activa</span>
        </div>
      </div>

      <div class="hero-right">
        <div class="qr-box">
          <div class="qr"></div>
          <p class="qr-text">Scan at entrance</p>
        </div>
      </div>
    </div>

    <div class="ticket-grid">
      <div class="info-box">
        <p class="label">Ticket ID</p>
        <p class="value" id="ticketIdValue">#T-1023</p>
      </div>

      <div class="info-box">
        <p class="label">Pase</p>
        <p class="value" id="passValue">VIP Lounge</p>
      </div>

      <div class="info-box">
        <p class="label">Precio</p>
        <p class="value" id="priceValue">89€</p>
      </div>

      <div class="info-box">
        <p class="label">Titular</p>
        <p class="value" id="holderValue">Nombre Apellidos</p>
      </div>
    </div>

    <footer class="detail-actions">
      <button class="danger-btn" id="cancelBtn" type="button">Cancelar Entrada</button>
      <button class="secondary-btn" type="button">Descargar PDF (simulado)</button>
    </footer>

  </section>
</main>

<!-- Scripts -->
<script src="../js/auth.js?v=1"></script>
<script src="../js/detail.js?v=1"></script>

</body>
</html>
